<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Positions - Eulen Labs</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            color: #343a40;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 720px;
            padding: 32px 24px;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
            color: #212529;
            margin-bottom: 40px;
        }
        .jobs {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .job-link {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2em;
            transition: background-color 0.3s ease;
            min-width: 320px;
        }
        .job-link:hover {
            background-color: #0056b3;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            h1 {
                color: #ffffff;
            }
            .job-link {
                background-color: #0056b3;
                color: #ffffff;
            }
            .job-link:hover {
                background-color: #007bff;
            }
        }
        @media (max-width: 640px) {
            body {
                height: auto;
                min-height: 100vh;
                padding: 24px 0;
            }
            h1 {
                font-size: 2em;
            }
            .job-link {
                min-width: 0;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="eulen.png" alt="Eulen Labs Logo" class="logo">
        <h1>Open Positions</h1>
        <div class="jobs">
            <a href="b2b-operations.html" class="job-link">B2B Operations – Scale Bitcoin-Native Payments</a>
            <a href="senior-devops.html" class="job-link">Senior DevOps Engineer – Cloud, Reliability & Incident Response</a>
        </div>
    </div>
</body>
</html>
